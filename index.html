<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huddle landing Page</title>
    <script src="https://kit.fontawesome.com/9a93ed8e82.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="Img/logo.svg" alt="Huddle">
        </div>
    </header>

    <h1>hello world</h1>

    <section class="hero"> 
        <div class="hero-img">
            <img src="Img/illustration-mockups.svg" alt="illustration-mockups">
        </div>
        <div class="hero-content">
            <h2>Build The Community Your Fans Will Love</h2>
            <p>Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections with your users as you engage in genuine discussion.</p>
            <a href="#" class="hero-btn">Register</a>
        </div>
    </section>

   <footer class="footer">
    <i class="fa-brands fa-facebook" style="font-size: 3em"></i>
    <i class="fa-brands fa-twitter" style="font-size: 3em"></i>
    <i class="fa-brands fa-instagram" style="font-size: 3em;"></i>
    </footer>
</body>
</html>
